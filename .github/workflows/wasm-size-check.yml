name: WASM Binary Size Check

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

env:
  WASM_SIZE_LIMIT_KB: 100

jobs:
  wasm-size:
    name: Check WASM binary sizes
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Build WASM binaries
        run: cargo build --release --target wasm32-unknown-unknown

      - name: Check binary sizes
        run: |
          LIMIT=$(( ${{ env.WASM_SIZE_LIMIT_KB }} * 1024 ))
          FAILED=0

          for wasm in target/wasm32-unknown-unknown/release/*.wasm; do
            SIZE=$(stat -c%s "$wasm")
            SIZE_KB=$(( SIZE / 1024 ))
            echo "$wasm: ${SIZE_KB}KB"
            if [ "$SIZE" -gt "$LIMIT" ]; then
              echo "ERROR: $wasm exceeds limit of ${{ env.WASM_SIZE_LIMIT_KB }}KB (actual: ${SIZE_KB}KB)"
              FAILED=1
            fi
          done

          if [ "$FAILED" -eq 1 ]; then
            exit 1
          fi
