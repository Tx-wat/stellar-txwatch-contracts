name: Publish Contract ABIs

on:
  release:
    types: [published]

jobs:
  publish-abis:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust wasm32 target
        uses: dtolnay/rust-toolchain@master
        with:
          targets: wasm32-unknown-unknown

      - name: Build contracts
        run: cargo build --release --target wasm32-unknown-unknown

      - name: Install Stellar CLI
        run: |
          curl -sSL https://github.com/stellar/stellar-cli/releases/latest/download/stellar-cli-x86_64-unknown-linux-gnu.tar.gz \
            | tar -xz -C /usr/local/bin stellar

      - name: Generate ABIs
        run: |
          mkdir -p abi
          stellar contract bindings json \
            --wasm target/wasm32-unknown-unknown/release/alert_registry.wasm \
            --output abi/alert-registry.json
          stellar contract bindings json \
            --wasm target/wasm32-unknown-unknown/release/watcher_registry.wasm \
            --output abi/watcher-registry.json

      - name: Upload ABIs to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            abi/alert-registry.json
            abi/watcher-registry.json
